name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # permite declanșare manuală

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout cod sursă
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js cu cache npm
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalare dependențe (Capacitor + plugins)
      - name: Install dependencies
        run: npm ci

      # 4. Setup Java 17 (necesar pentru Gradle Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 5. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6. Acceptare licențe Android SDK
      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      # 7. Instalare componente Android SDK necesare
      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      # 8. Adăugare platformă Android Capacitor (dacă nu există deja)
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Folderul android/ există deja, se sare adăugarea."
          fi

      # 9. Sync Capacitor (copiaza www/ in android/app/src/main/assets/public)
      - name: Capacitor Sync
        run: npx cap sync android

      # 10. Acordare permisiuni Gradle wrapper
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # 11. Build APK Debug
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 12. Upload APK ca artifact descărcabil
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 13. Afișare info APK
      - name: APK Info
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK construit cu succes!"
            echo "📦 Dimensiune: $SIZE"
            echo "📍 Cale: $APK_PATH"
          else
            echo "❌ APK-ul nu a fost găsit!"
            exit 1
          fi
